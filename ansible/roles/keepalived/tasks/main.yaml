---
- name: Forcefully remove stale dpkg and apt locks
  shell: rm -rf /var/lib/apt/lists/lock;rm -rf /var/cache/apt/archives/lock;rm -rf /var/lib/dpkg/lock*

- name: Install Keepalived and Curl
  apt:
    name: 
      - keepalived
      - curl
    state: present

- name: Render Keepalived configuration
  template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
    mode: '0644'
  notify: Restart Keepalived

- name: Ensure Keepalived is running and enabled
  systemd:
    name: keepalived
    state: started
    enabled: yes