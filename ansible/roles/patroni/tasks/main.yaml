---
- name: Create Patroni directory
  file:
    path: /opt/patroni
    state: directory
    mode: '0755'

- name: Render Patroni docker-compose.yaml
  template:
    src: docker-compose.yaml.j2
    dest: /opt/patroni/docker-compose.yaml
    mode: '0644'

- name: Apply Patroni Docker Compose
  community.docker.docker_compose_v2:
    project_src: /opt/patroni
    state: present