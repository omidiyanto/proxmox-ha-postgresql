name: Danger - Destroy Cluster
on: workflow_dispatch
jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Connect to Tailscale (Bastion Proxy)
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      
      - name: Inject Dynamic Secrets (Placeholders)
        run: |
          sed -i "s/__HCP_ORG__/${{ secrets.HCP_ORG }}/g" terraform/versions.tf
          sed -i "s/__HCP_WORKSPACE__/${{ secrets.HCP_WORKSPACE }}/g" terraform/versions.tf

      - name: Setup SSH Public Key (Decode Base64)
        run: |
          {
            echo 'TF_VAR_ssh_public_key<<EOF'
            echo "${{ secrets.SSH_PUBLIC_KEY_B64 }}" | base64 --decode
            echo EOF
          } >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          
      - name: Terraform Destroy
        working-directory: terraform
        env:
          TF_VAR_proxmox_api_url: ${{ secrets.PROXMOX_API_URL }}
          TF_VAR_proxmox_token_id: ${{ secrets.PROXMOX_TOKEN_ID }}
          TF_VAR_proxmox_token_secret: ${{ secrets.PROXMOX_TOKEN_SECRET }}
        run: |
          terraform init
          terraform destroy -auto-approve